name: Feature request
description: Suggest an improvement for GitPulse.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow is hard or missing today?
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: What should GitPulse help the user do?
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: Constraints
      description: Privacy, local-first, UI, performance, or compatibility constraints.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Scanner
        - Dashboard
        - Code Health
        - NBA-style stats
        - Reports and exports
        - GitHub Pages or docs
        - Build and release
        - Other
